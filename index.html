<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jigsaw — Hand Gesture Puzzle</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --sidebar-w:    272px;
  --bg:           #eef0f5;
  --sidebar-bg:   #ffffff;
  --surface:      #ffffff;
  --border:       rgba(0,0,0,0.07);
  --shadow-sm:    0 1px 4px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-md:    0 2px 8px rgba(0,0,0,0.07), 0 8px 32px rgba(0,0,0,0.09);
  --accent:       #6366f1;
  --accent-light: rgba(99,102,241,0.11);
  --accent-ring:  rgba(99,102,241,0.32);
  --snap:         #10b981;
  --hover:        #f59e0b;
  --text:         #1e293b;
  --text-muted:   #64748b;
  --text-faint:   #94a3b8;
  --error:        #ef4444;
  --ok:           #10b981;
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  font-family: 'Inter','Segoe UI',system-ui,sans-serif;
  color: var(--text);
  background: var(--bg);
  user-select: none;
}

/* ── App shell ────────────────────────────────────────────── */
#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ── Sidebar ──────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 0;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 10;
  flex-shrink: 0;
}

/* Scrollbar */
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Sidebar logo / header */
#sidebar-header {
  padding: 22px 20px 14px;
  border-bottom: 1px solid var(--border);
}
#logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
#logo-icon {
  font-size: 22px;
  line-height: 1;
}
#logo-text {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -.4px;
  color: var(--text);
}
#logo-sub {
  font-size: 11px;
  color: var(--text-faint);
  margin-top: 1px;
}

/* Sidebar section */
.sb-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.sb-section:last-child { border-bottom: none; }

.sb-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 10px;
}

/* Status */
#status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 500;
}
#status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--text-faint);
  flex-shrink: 0;
  transition: background 0.3s;
}
#status-dot.ready   { background: var(--ok); }
#status-dot.error   { background: var(--error); }
#status-dot.loading { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* Progress */
#prog-track {
  margin-top: 10px;
  height: 5px;
  background: rgba(0,0,0,0.06);
  border-radius: 99px;
  overflow: hidden;
  position: relative;
}
#prog-fill {
  height: 100%;
  width: 0%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent), var(--snap));
  transition: width 0.4s ease;
}
#prog-label {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-faint);
}

/* Timer */
#timer-display {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -2px;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-bottom: 12px;
  transition: color 0.3s;
}
#timer-display.running { color: var(--accent); }
#timer-display.done    { color: var(--snap); }

#timer-btns {
  display: flex;
  gap: 6px;
}
.tbtn {
  flex: 1;
  padding: 7px 0;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  text-align: center;
}
.tbtn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent-ring); }
.tbtn.primary { background: var(--accent); color: #fff; border-color: transparent; }
.tbtn.primary:hover { opacity: .88; }

#best-row {
  margin-top: 10px;
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  color: var(--text-faint);
}
#best-row .trophy { font-size: 13px; }

/* Hints */
#hint-card {
  font-size: 12.5px;
  line-height: 2;
  color: var(--text-muted);
}
#hint-card strong { color: var(--text); font-weight: 600; }

/* Controls */
.ctrl-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.ctrl-row {
  display: flex;
  gap: 6px;
}
.btn {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s;
  white-space: nowrap;
  text-align: center;
}
.btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent-ring); }
.btn.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); font-weight: 600; }
.btn.peek-btn:active,
.btn.peek-btn.peeking { background: rgba(245,158,11,.13); color: #d97706; border-color: rgba(245,158,11,.4); }
label.btn { cursor: pointer; }

/* Sound btn in sidebar footer */
#sound-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 12.5px;
  color: var(--text-muted);
}
#sound-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  padding: 5px 0;
}
#sound-toggle:hover { color: var(--text); }
.toggle-track {
  width: 32px; height: 18px;
  border-radius: 9px;
  background: var(--border);
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle-track.on { background: var(--accent); }
.toggle-thumb {
  position: absolute;
  top: 2px; left: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #fff;
  transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle-track.on .toggle-thumb { transform: translateX(14px); }

/* ── Canvas area ──────────────────────────────────────────── */
#canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

#puzzle-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  cursor: none;
}
body.mouse-mode #puzzle-canvas { cursor: crosshair; }

/* Webcam */
#webcam-wrap {
  position: absolute;
  bottom: 16px; right: 16px;
  width: 190px; height: 142px;
  border-radius: 12px;
  overflow: hidden;
  background: #000;
  box-shadow: var(--shadow-md);
  border: 2px solid rgba(255,255,255,0.9);
  z-index: 20;
}
#webcam {
  width:100%; height:100%;
  object-fit:cover; display:block;
  transform:scaleX(-1);
}
#landmark-canvas {
  position:absolute; inset:0;
  width:100%; height:100%;
  transform:scaleX(-1); pointer-events:none;
}
#cam-badge {
  position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.55); color:rgba(255,255,255,.75);
  font-size:10px; padding:2px 8px; border-radius:20px;
  white-space:nowrap; pointer-events:none; backdrop-filter:blur(4px);
}
#cam-badge.pinching { color:#fbbf24; }
#cam-badge.grabbing { color:#a5b4fc; }

/* Peek label */
#peek-label {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(245,158,11,.88); color:#fff;
  font-size:13px; font-weight:600; padding:6px 18px;
  border-radius:20px; pointer-events:none; opacity:0;
  transition:opacity .2s; z-index:30;
}
#peek-label.show { opacity:1; }

/* ── Win overlay ──────────────────────────────────────────── */
#win-screen {
  display:none; position:absolute; inset:0; z-index:50;
  background:rgba(238,240,245,.75); backdrop-filter:blur(12px);
  justify-content:center; align-items:center;
}
#win-card {
  background:var(--surface); border-radius:24px;
  box-shadow:var(--shadow-md); padding:40px 52px;
  text-align:center; display:flex; flex-direction:column;
  align-items:center; gap:11px;
  animation:cardPop .5s cubic-bezier(.22,1,.36,1) forwards; opacity:0;
}
@keyframes cardPop {
  from{transform:scale(.85) translateY(16px);opacity:0}
  to  {transform:scale(1)   translateY(0);   opacity:1}
}
#win-emoji  { font-size:50px; line-height:1; }
#win-stars  { font-size:24px; letter-spacing:4px; }
#win-title  { font-size:23px; font-weight:700; letter-spacing:-.5px; }
#win-sub    { font-size:13px; color:var(--text-muted); }
#win-best   { font-size:12px; color:var(--accent); font-weight:600; display:none; }
#win-again  {
  margin-top:6px; background:var(--accent); color:#fff;
  border:none; border-radius:10px; padding:10px 32px;
  font-size:14px; font-weight:600; cursor:pointer;
  transition:opacity .15s, transform .1s;
}
#win-again:hover { opacity:.88; transform:scale(1.02); }

/* ── Loading overlay ──────────────────────────────────────── */
#loading-overlay {
  position:fixed; inset:0; z-index:100; background:var(--bg);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:16px; transition:opacity .45s;
}
#loading-overlay.hidden { opacity:0; pointer-events:none; }
.spinner {
  width:36px; height:36px;
  border:3px solid rgba(99,102,241,.15);
  border-top-color:var(--accent);
  border-radius:50%; animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text { font-size:14px; font-weight:500; color:var(--text-muted); }
#skip-btn {
  display:none; background:transparent;
  border:1px solid var(--border); border-radius:8px;
  padding:7px 18px; font-size:13px; color:var(--text-muted);
  cursor:pointer; transition:background .15s,color .15s;
}
#skip-btn:hover { background:var(--accent-light); color:var(--accent); }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Loading MediaPipe…</div>
  <button id="skip-btn" onclick="switchToMouseMode('No camera — using mouse')">Skip camera, use mouse</button>
</div>

<div id="app">

  <!-- ══ SIDEBAR ══════════════════════════════════════════ -->
  <aside id="sidebar">

    <!-- Logo -->
    <div id="sidebar-header">
      <div id="logo">
        <div id="logo-icon">🧩</div>
        <div>
          <div id="logo-text">Jigsaw</div>
          <div id="logo-sub">Hand Gesture Puzzle</div>
        </div>
      </div>
    </div>

    <!-- Status + Progress -->
    <div class="sb-section">
      <div class="sb-label">Status</div>
      <div id="status-row">
        <div id="status-dot" class="loading"></div>
        <span id="status-text">Starting camera…</span>
      </div>
      <div id="prog-track"><div id="prog-fill"></div></div>
      <div id="prog-label">0 of 0 pieces placed</div>
    </div>

    <!-- Timer -->
    <div class="sb-section">
      <div class="sb-label">Timer</div>
      <div id="timer-display">0:00</div>
      <div id="timer-btns">
        <button class="tbtn primary" id="timer-btn" onclick="toggleTimer()">▶ Start</button>
        <button class="tbtn"         id="reset-btn" onclick="resetTimer()" title="Reset">↺</button>
      </div>
      <div id="best-row">
        <span class="trophy">🏆</span>
        <span id="best-val"></span>
      </div>
    </div>

    <!-- Controls -->
    <div class="sb-section">
      <div class="sb-label">Grid</div>
      <div class="ctrl-row">
        <button class="btn active" id="btn-3" onclick="setGrid(3)">3 × 3</button>
        <button class="btn"        id="btn-4" onclick="setGrid(4)">4 × 4</button>
      </div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Actions</div>
      <div class="ctrl-group">
        <div class="ctrl-row">
          <button class="btn" onclick="onShuffle()">↺ Shuffle</button>
          <button class="btn peek-btn" id="peek-btn"
            onmousedown="startPeek()" onmouseup="endPeek()"
            onmouseleave="endPeek()" ontouchstart="startPeek()" ontouchend="endPeek()">
            👁 Peek
          </button>
        </div>
        <label class="btn">
          ⬆ Upload image
          <input type="file" accept="image/*" onchange="loadCustomImage(this)" style="display:none">
        </label>
      </div>
    </div>

    <!-- Hints -->
    <div class="sb-section">
      <div class="sb-label">How to play</div>
      <div id="hint-card">
        🤏 <strong>Pinch</strong> to grab a piece<br>
        ✋ <strong>Move</strong> while pinching to drag<br>
        👋 <strong>Open hand</strong> to drop
      </div>
    </div>

    <!-- Sound toggle -->
    <div class="sb-section" style="margin-top:auto">
      <div id="sound-row">
        <span>Sound effects</span>
        <div id="sound-toggle" onclick="toggleSound()">
          <div class="toggle-track on" id="sound-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </div>
    </div>

  </aside>

  <!-- ══ CANVAS AREA ══════════════════════════════════════ -->
  <main id="canvas-area">
    <canvas id="puzzle-canvas"></canvas>

    <!-- Webcam preview -->
    <div id="webcam-wrap">
      <video id="webcam" autoplay playsinline muted></video>
      <canvas id="landmark-canvas"></canvas>
      <div id="cam-badge">initializing…</div>
    </div>

    <!-- Peek label -->
    <div id="peek-label">👁 Peeking…</div>

    <!-- Win overlay (scoped to canvas area) -->
    <div id="win-screen">
      <div id="win-card">
        <div id="win-emoji">🎉</div>
        <div id="win-stars"></div>
        <div id="win-title">Puzzle complete!</div>
        <div id="win-sub">Amazing work</div>
        <div id="win-best">🏆 New best time!</div>
        <button id="win-again" onclick="onShuffle()">Play again</button>
      </div>
    </div>
  </main>

</div><!-- #app -->

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════ */
const PINCH_THRESH  = 0.062;
const SNAP_FRACTION = 0.30;
const SMOOTH        = 0.28;
const SNAP_EASE     = 0.13;
const STAR_THRESH   = { 3:[60,180], 4:[150,360] };

/* ═══════════════════════════════════════════════════════════
   DOM
═══════════════════════════════════════════════════════════ */
const canvas      = document.getElementById('puzzle-canvas');
const ctx         = canvas.getContext('2d');
const lcCanvas    = document.getElementById('landmark-canvas');
const lcCtx       = lcCanvas.getContext('2d');
const video       = document.getElementById('webcam');
const canvasArea  = document.getElementById('canvas-area');

/* ═══════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════ */
let gridSize=3, pieces=[], srcImage=null;
let grabbedPiece=null, grabOffset={x:0,y:0};
let curX=-400,curY=-400,rawX=-400,rawY=-400;
let handVisible=false,isPinching=false,wasPinching=false;
let confetti=[],snapParticles=[],isPeeking=false;
let gameOver=false, inputMode='camera';

// Timer
let timerRunning=false,timerStartAt=0,timerAccum=0,timerFinal=0;
let bestTimes=JSON.parse(localStorage.getItem('puzzleBestTimes')||'{}');

// Sound
let soundOn=true, audioCtx=null;

/* ═══════════════════════════════════════════════════════════
   CANVAS  — sized to canvas-area container, not full window
═══════════════════════════════════════════════════════════ */
function resizeCanvas() {
  const w = canvasArea.clientWidth;
  const h = canvasArea.clientHeight;
  if (canvas.width===w && canvas.height===h) return;
  canvas.width=w; canvas.height=h;
  if (srcImage && pieces.length) reinitOnResize();
}

function reinitOnResize() {
  const L=layout();
  pieces.forEach(p=>{
    const tx=L.ox+p.col*L.pw, ty=L.oy+p.row*L.ph;
    if (!p.placed){
      p.x=p.targetX?(p.x/p.targetX)*tx:tx;
      p.y=p.targetY?(p.y/p.targetY)*ty:ty;
    }
    p.targetX=tx;p.targetY=ty;p.w=L.pw;p.h=L.ph;
    if(p.placed){p.x=tx;p.y=ty;}
    p.srcX=(p.col/gridSize)*srcImage.naturalWidth;
    p.srcY=(p.row/gridSize)*srcImage.naturalHeight;
    p.srcW=srcImage.naturalWidth/gridSize;
    p.srcH=srcImage.naturalHeight/gridSize;
  });
}

window.addEventListener('resize', resizeCanvas);
// Also watch sidebar boundary
new ResizeObserver(resizeCanvas).observe(canvasArea);
resizeCanvas();

function layout() {
  const size=Math.min(canvas.width*.68, canvas.height*.82);
  const ox=(canvas.width-size)/2, oy=(canvas.height-size)/2;
  return {size,ox,oy,pw:size/gridSize,ph:size/gridSize};
}

/* ═══════════════════════════════════════════════════════════
   TIMER
═══════════════════════════════════════════════════════════ */
function timerMs(){
  return timerRunning ? timerAccum+(Date.now()-timerStartAt) : timerAccum;
}
function toggleTimer(){
  const btn=document.getElementById('timer-btn');
  if(timerRunning){
    timerAccum+=Date.now()-timerStartAt; timerRunning=false;
    btn.textContent='▶ Resume'; btn.classList.remove('primary');
  } else {
    timerStartAt=Date.now(); timerRunning=true;
    btn.textContent='⏸ Pause'; btn.classList.add('primary');
  }
}
function resetTimer(){
  timerRunning=false;timerAccum=0;timerStartAt=0;
  const btn=document.getElementById('timer-btn');
  btn.textContent='▶ Start'; btn.classList.add('primary');
  document.getElementById('timer-display').className='';
  updateTimerDisplay();
}
function stopTimerOnWin(){
  if(timerRunning){timerAccum+=Date.now()-timerStartAt;timerRunning=false;}
  timerFinal=timerAccum;
}
function fmtTime(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,'0')}`;
}
function updateTimerDisplay(){
  const el=document.getElementById('timer-display');
  el.textContent=fmtTime(timerRunning?timerMs():timerAccum);
  el.className=timerRunning?'running':gameOver?'done':'';
}
function updateBestDisplay(){
  const key=String(gridSize), best=bestTimes[key];
  const row=document.getElementById('best-row');
  if(best){document.getElementById('best-val').textContent=`Best ${gridSize}×${gridSize}: ${fmtTime(best)}`;row.style.display='flex';}
  else row.style.display='none';
}
setInterval(()=>{ if(timerRunning) updateTimerDisplay(); },100);

/* ═══════════════════════════════════════════════════════════
   SOUND
═══════════════════════════════════════════════════════════ */
function ensureAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
}
function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('sound-track').classList.toggle('on',soundOn);
}
function playPickup(){
  if(!soundOn)return; ensureAudio();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sine';const t=audioCtx.currentTime;
  o.frequency.setValueAtTime(520,t);o.frequency.exponentialRampToValueAtTime(680,t+.08);
  g.gain.setValueAtTime(.07,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
  o.start(t);o.stop(t+.12);
}
function playSnap(){
  if(!soundOn)return; ensureAudio();
  const sr=audioCtx.sampleRate,len=sr*.06|0;
  const buf=audioCtx.createBuffer(1,len,sr),d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,3);
  const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
  src.buffer=buf;flt.type='bandpass';flt.frequency.value=900;flt.Q.value=.6;
  src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
  const t=audioCtx.currentTime;
  g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.06);
  src.start(t);src.stop(t+.06);
  const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o.connect(g2);g2.connect(audioCtx.destination);o.type='sine';
  o.frequency.setValueAtTime(660,t);o.frequency.exponentialRampToValueAtTime(1100,t+.1);
  g2.gain.setValueAtTime(.06,t);g2.gain.exponentialRampToValueAtTime(.001,t+.1);
  o.start(t);o.stop(t+.1);
}
function playWin(){
  if(!soundOn)return; ensureAudio();
  [523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type='triangle';o.frequency.value=f;
    const t=audioCtx.currentTime;
    g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);
    o.start(t);o.stop(t+.45);
  },i*110));
}

/* ═══════════════════════════════════════════════════════════
   IMAGE
═══════════════════════════════════════════════════════════ */
function loadImage(src){
  const img=new Image();if(src.startsWith('http'))img.crossOrigin='anonymous';
  img.onload=()=>{srcImage=img;initPuzzle();};
  img.onerror=()=>{srcImage=makeFallback();initPuzzle();};
  img.src=src;
}
function makeFallback(){
  const oc=Object.assign(document.createElement('canvas'),{width:600,height:600});
  const c=oc.getContext('2d');
  const g=c.createLinearGradient(0,0,600,600);
  g.addColorStop(0,'#c7d2fe');g.addColorStop(.4,'#a5b4fc');
  g.addColorStop(.7,'#818cf8');g.addColorStop(1,'#6366f1');
  c.fillStyle=g;c.fillRect(0,0,600,600);
  for(let i=0;i<18;i++){
    c.beginPath();c.arc(Math.random()*600,Math.random()*600,20+Math.random()*80,0,6.28);
    c.fillStyle=`rgba(255,255,255,${Math.random()*.15})`;c.fill();
  }
  c.fillStyle='rgba(255,255,255,.3)';c.font='bold 56px system-ui';c.textAlign='center';
  c.fillText('Jigsaw',300,270);c.font='22px system-ui';c.fillText('Hand Gesture Puzzle',300,318);
  const el=new Image();el.src=oc.toDataURL();return el;
}
function loadCustomImage(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();r.onload=e=>loadImage(e.target.result);
  r.readAsDataURL(file);input.value='';
}
function setGrid(n){
  gridSize=n;
  document.getElementById('btn-3').classList.toggle('active',n===3);
  document.getElementById('btn-4').classList.toggle('active',n===4);
  updateBestDisplay();
  if(srcImage)initPuzzle();
}

/* ═══════════════════════════════════════════════════════════
   PUZZLE
═══════════════════════════════════════════════════════════ */
function initPuzzle(){
  const L=layout();pieces=[];
  for(let row=0;row<gridSize;row++)
    for(let col=0;col<gridSize;col++)
      pieces.push({
        id:row*gridSize+col,row,col,x:0,y:0,
        targetX:L.ox+col*L.pw,targetY:L.oy+row*L.ph,
        w:L.pw,h:L.ph,
        srcX:(col/gridSize)*srcImage.naturalWidth,
        srcY:(row/gridSize)*srcImage.naturalHeight,
        srcW:srcImage.naturalWidth/gridSize,
        srcH:srcImage.naturalHeight/gridSize,
        placed:false,snapGlow:0,snapX:null,snapY:null,wobble:0,
      });
  scatter();
}

function scatter(){
  const L=layout(),m=14,{ox,oy,size}=L;
  pieces.forEach(p=>{
    p.placed=false;p.snapGlow=0;p.snapX=null;p.snapY=null;p.wobble=0;
    const lW=ox-p.w-m*2,rW=canvas.width-(ox+size)-p.w-m*2;
    const tH=oy-p.h-m*2,bH=canvas.height-(oy+size)-p.h-m*2;
    const zones=[];
    if(lW>0)zones.push('L');if(rW>0)zones.push('R');
    if(tH>0)zones.push('T');if(bH>0)zones.push('B');
    let px,py;
    if(!zones.length){
      px=m+Math.random()*(canvas.width-p.w-m*2);
      py=m+Math.random()*(canvas.height-p.h-m*2);
    } else {
      const z=zones[Math.random()*zones.length|0];
      if(z==='L'){px=m+Math.random()*lW;         py=m+Math.random()*(canvas.height-p.h-m*2);}
      if(z==='R'){px=ox+size+m+Math.random()*rW; py=m+Math.random()*(canvas.height-p.h-m*2);}
      if(z==='T'){px=m+Math.random()*(canvas.width-p.w-m*2);py=m+Math.random()*tH;}
      if(z==='B'){px=m+Math.random()*(canvas.width-p.w-m*2);py=oy+size+m+Math.random()*bH;}
    }
    p.x=Math.max(m,Math.min(canvas.width-p.w-m,px));
    p.y=Math.max(m,Math.min(canvas.height-p.h-m,py));
  });
  pieces.sort(()=>Math.random()-.5);
}

function onShuffle(){
  document.getElementById('win-screen').style.display='none';
  gameOver=false;confetti=[];snapParticles=[];grabbedPiece=null;
  resetTimer();scatter();updateProgress();updateBestDisplay();
}

/* ═══════════════════════════════════════════════════════════
   PEEK
═══════════════════════════════════════════════════════════ */
function startPeek(){
  isPeeking=true;
  document.getElementById('peek-btn').classList.add('peeking');
  document.getElementById('peek-label').classList.add('show');
}
function endPeek(){
  isPeeking=false;
  document.getElementById('peek-btn').classList.remove('peeking');
  document.getElementById('peek-label').classList.remove('show');
}

/* ═══════════════════════════════════════════════════════════
   SNAP BURST
═══════════════════════════════════════════════════════════ */
const BURST=['#6366f1','#10b981','#f59e0b','#ec4899','#3b82f6','#8b5cf6'];
function spawnBurst(x,y){
  for(let i=0;i<14;i++){
    const a=Math.random()*Math.PI*2,s=2.5+Math.random()*4;
    snapParticles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1,
      r:2+Math.random()*3,life:1,decay:.04+Math.random()*.04,
      color:BURST[Math.random()*BURST.length|0]});
  }
}
function renderSnapParticles(){
  snapParticles=snapParticles.filter(p=>p.life>0);
  snapParticles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.vx*=.96;p.life-=p.decay;
    ctx.save();ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.fill();ctx.restore();
  });
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function render(){
  resizeCanvas();
  ctx.fillStyle='#eef0f5';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(!srcImage){
    ctx.fillStyle='#94a3b8';ctx.font='15px system-ui';ctx.textAlign='center';
    ctx.fillText('Loading image…',canvas.width/2,canvas.height/2);
    ctx.textAlign='left';requestAnimationFrame(render);return;
  }

  const L=layout(),t=performance.now();

  // Board shadow
  for(const[blur,alpha,dy]of[[40,.07,8],[10,.05,2]]){
    ctx.save();ctx.shadowColor=`rgba(0,0,0,${alpha})`;ctx.shadowBlur=blur;ctx.shadowOffsetY=dy;
    ctx.fillStyle='#fff';roundRect(ctx,L.ox,L.oy,L.size,L.size,10);ctx.fill();ctx.restore();
  }
  // Subtle pulse glow when timer running
  if(timerRunning){
    const pulse=.5+.5*Math.sin(t*.003);
    ctx.save();ctx.shadowColor=`rgba(99,102,241,${.09*pulse})`;ctx.shadowBlur=24;
    ctx.fillStyle='#fff';roundRect(ctx,L.ox,L.oy,L.size,L.size,10);ctx.fill();ctx.restore();
  }
  ctx.fillStyle='#fff';roundRect(ctx,L.ox,L.oy,L.size,L.size,10);ctx.fill();

  // Target slots
  pieces.forEach(p=>{
    if(p.placed)return;
    ctx.globalAlpha=.055;
    ctx.drawImage(srcImage,p.srcX,p.srcY,p.srcW,p.srcH,p.targetX,p.targetY,p.w,p.h);
    ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1.5;ctx.setLineDash([4,5]);
    ctx.strokeRect(p.targetX+1,p.targetY+1,p.w-2,p.h-2);
    ctx.setLineDash([]);
  });

  // Snap animation
  pieces.forEach(p=>{
    if(p.snapX===null)return;
    p.snapX+=(p.targetX-p.snapX)*SNAP_EASE;p.snapY+=(p.targetY-p.snapY)*SNAP_EASE;
    p.x=p.snapX;p.y=p.snapY;
    if(Math.abs(p.x-p.targetX)<.3){p.x=p.targetX;p.y=p.targetY;p.snapX=null;p.snapY=null;}
  });

  pieces.forEach(p=>{if(p!==grabbedPiece)drawPiece(p,t);});
  if(grabbedPiece)drawPiece(grabbedPiece,t);

  // Peek overlay
  if(isPeeking&&srcImage){
    const L2=layout();
    ctx.save();ctx.globalAlpha=.72;
    ctx.drawImage(srcImage,L2.ox,L2.oy,L2.size,L2.size);ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(245,158,11,.7)';ctx.lineWidth=2.5;
    roundRect(ctx,L2.ox,L2.oy,L2.size,L2.size,10);ctx.stroke();
    ctx.restore();
  }

  renderConfetti();
  renderSnapParticles();
  drawCursor(t);
  requestAnimationFrame(render);
}

function drawPiece(p,t){
  if(!srcImage)return;
  const isGrabbed=p===grabbedPiece;
  const isHovered=!isGrabbed&&!p.placed&&handVisible
    &&curX>=p.x&&curX<=p.x+p.w&&curY>=p.y&&curY<=p.y+p.h;
  if(isHovered&&!isPinching) p.wobble=(p.wobble||0)+.18;
  else p.wobble=(p.wobble||0)*.85;
  ctx.save();
  if(isGrabbed){ctx.shadowColor='rgba(99,102,241,.42)';ctx.shadowBlur=32;ctx.shadowOffsetY=14;}
  else if(p.snapGlow>0){
    ctx.shadowColor='rgba(16,185,129,.55)';ctx.shadowBlur=22*p.snapGlow;
    p.snapGlow-=.03;if(p.snapGlow<0)p.snapGlow=0;
  } else if(isHovered&&!isPinching){ctx.shadowColor='rgba(245,158,11,.38)';ctx.shadowBlur=16;}
  else if(!p.placed){ctx.shadowColor='rgba(0,0,0,.12)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;}
  const dy=isHovered&&!isPinching?Math.sin(p.wobble)*2.5:0;
  ctx.translate(0,dy);
  ctx.beginPath();ctx.rect(p.x,p.y,p.w,p.h);ctx.clip();
  ctx.drawImage(srcImage,p.srcX,p.srcY,p.srcW,p.srcH,p.x,p.y,p.w,p.h);
  ctx.strokeStyle=p.placed?'rgba(16,185,129,.3)':isGrabbed?'rgba(99,102,241,.85)':isHovered?'rgba(245,158,11,.75)':'rgba(255,255,255,.65)';
  ctx.lineWidth=isGrabbed?2:1.5;ctx.strokeRect(p.x,p.y,p.w,p.h);
  ctx.restore();
}

function drawCursor(t){
  if(!handVisible)return;
  ctx.save();
  if(isPinching){
    ctx.beginPath();ctx.arc(curX,curY,10,0,Math.PI*2);
    ctx.fillStyle='rgba(99,102,241,.22)';ctx.fill();
    ctx.strokeStyle='#6366f1';ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(curX,curY,3,0,Math.PI*2);ctx.fillStyle='#6366f1';ctx.fill();
  } else {
    const r=15+Math.sin(t*.004)*1.5;
    ctx.beginPath();ctx.arc(curX,curY,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(30,41,59,.38)';ctx.lineWidth=1.8;ctx.stroke();
    ctx.beginPath();ctx.arc(curX,curY,3,0,Math.PI*2);ctx.fillStyle='rgba(30,41,59,.48)';ctx.fill();
  }
  ctx.restore();
}

/* ═══════════════════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════════════════ */
function spawnConfetti(){
  const pal=['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#f43f5e'];
  for(let i=0;i<200;i++) confetti.push({
    x:Math.random()*canvas.width,y:-20-Math.random()*120,
    vx:(Math.random()-.5)*10,vy:Math.random()*4+2,
    w:Math.random()*12+4,h:Math.random()*5+2,
    rot:Math.random()*6.28,rotV:(Math.random()-.5)*.2,
    color:pal[Math.random()*pal.length|0],life:1,decay:.003+Math.random()*.004,
  });
}
function renderConfetti(){
  confetti=confetti.filter(c=>c.life>0);
  confetti.forEach(c=>{
    c.x+=c.vx;c.y+=c.vy;c.vy+=.13;c.vx*=.997;c.rot+=c.rotV;c.life-=c.decay;
    ctx.save();ctx.globalAlpha=c.life;ctx.translate(c.x,c.y);ctx.rotate(c.rot);
    ctx.fillStyle=c.color;ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);ctx.restore();
  });
}

/* ═══════════════════════════════════════════════════════════
   PROGRESS & WIN
═══════════════════════════════════════════════════════════ */
function updateProgress(){
  const placed=pieces.filter(p=>p.placed).length,total=pieces.length;
  const pct=total?(placed/total)*100:0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`${placed} of ${total} pieces placed`;
}

function getStars(secs){
  const[t3,t2]=STAR_THRESH[gridSize]||STAR_THRESH[3];
  return secs<=t3?3:secs<=t2?2:1;
}

function checkWin(){
  updateProgress();
  if(gameOver||!pieces.length||!pieces.every(p=>p.placed))return;
  gameOver=true;stopTimerOnWin();updateTimerDisplay();
  spawnConfetti();playWin();
  const secs=Math.round(timerFinal/1000),key=String(gridSize);
  const isNewBest=timerFinal>0&&(!bestTimes[key]||timerFinal<bestTimes[key]);
  if(isNewBest){bestTimes[key]=timerFinal;localStorage.setItem('puzzleBestTimes',JSON.stringify(bestTimes));}
  setTimeout(()=>{
    document.getElementById('win-stars').textContent='⭐'.repeat(getStars(secs))+'☆'.repeat(3-getStars(secs));
    document.getElementById('win-sub').textContent=timerFinal>0?`Completed in ${fmtTime(timerFinal)}`:'Amazing work!';
    document.getElementById('win-best').style.display=isNewBest?'block':'none';
    document.getElementById('win-screen').style.display='flex';
    updateBestDisplay();
  },900);
}

/* ═══════════════════════════════════════════════════════════
   GRAB / DROP
═══════════════════════════════════════════════════════════ */
function grabAt(x,y){
  for(let i=pieces.length-1;i>=0;i--){
    const p=pieces[i];if(p.placed)continue;
    if(x>=p.x&&x<=p.x+p.w&&y>=p.y&&y<=p.y+p.h){
      grabbedPiece=p;grabOffset={x:x-p.x,y:y-p.y};
      pieces.splice(i,1);pieces.push(p);playPickup();return;
    }
  }
  grabbedPiece=null;
}
function dropCurrent(){
  if(!grabbedPiece)return;
  const p=grabbedPiece,snap=Math.min(p.w,p.h)*SNAP_FRACTION;
  grabbedPiece=null;
  if(Math.abs(p.x-p.targetX)<snap&&Math.abs(p.y-p.targetY)<snap){
    p.snapX=p.x;p.snapY=p.y;p.placed=true;p.snapGlow=1;
    spawnBurst(p.targetX+p.w/2,p.targetY+p.h/2);
    playSnap();checkWin();
  }
}

/* ═══════════════════════════════════════════════════════════
   MOUSE / TOUCH
═══════════════════════════════════════════════════════════ */
function canvasPos(e){
  const r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}
canvas.addEventListener('mousedown',e=>{
  if(inputMode!=='mouse')return;
  const{x,y}=canvasPos(e);curX=x;curY=y;handVisible=true;isPinching=true;grabAt(x,y);
});
canvas.addEventListener('mousemove',e=>{
  if(inputMode!=='mouse')return;
  const{x,y}=canvasPos(e);curX=x;curY=y;handVisible=true;
  if(isPinching&&grabbedPiece){grabbedPiece.x=x-grabOffset.x;grabbedPiece.y=y-grabOffset.y;}
});
canvas.addEventListener('mouseup',   ()=>{if(inputMode!=='mouse')return;isPinching=false;dropCurrent();});
canvas.addEventListener('mouseleave',()=>{if(inputMode!=='mouse')return;isPinching=false;dropCurrent();handVisible=false;});
canvas.addEventListener('touchstart',e=>{
  if(inputMode!=='mouse')return;e.preventDefault();
  const{x,y}=canvasPos(e);curX=x;curY=y;handVisible=true;isPinching=true;grabAt(x,y);
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(inputMode!=='mouse')return;e.preventDefault();
  const{x,y}=canvasPos(e);curX=x;curY=y;
  if(isPinching&&grabbedPiece){grabbedPiece.x=x-grabOffset.x;grabbedPiece.y=y-grabOffset.y;}
},{passive:false});
canvas.addEventListener('touchend',()=>{if(inputMode!=='mouse')return;isPinching=false;dropCurrent();});

/* ═══════════════════════════════════════════════════════════
   MEDIAPIPE
═══════════════════════════════════════════════════════════ */
const CONNS=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];

function drawLandmarks(lm,pinching){
  const w=lcCanvas.width=lcCanvas.offsetWidth||190;
  const h=lcCanvas.height=lcCanvas.offsetHeight||142;
  lcCtx.clearRect(0,0,w,h);
  lcCtx.strokeStyle='rgba(99,102,241,.7)';lcCtx.lineWidth=1.5;
  CONNS.forEach(([a,b])=>{lcCtx.beginPath();lcCtx.moveTo(lm[a].x*w,lm[a].y*h);lcCtx.lineTo(lm[b].x*w,lm[b].y*h);lcCtx.stroke();});
  lm.forEach((l,i)=>{
    const key=i===4||i===8;lcCtx.beginPath();lcCtx.arc(l.x*w,l.y*h,key?5:2.5,0,Math.PI*2);
    lcCtx.fillStyle=key?'#f59e0b':'rgba(255,255,255,.85)';lcCtx.fill();
  });
  if(pinching){lcCtx.beginPath();lcCtx.moveTo(lm[4].x*w,lm[4].y*h);lcCtx.lineTo(lm[8].x*w,lm[8].y*h);lcCtx.strokeStyle='#f59e0b';lcCtx.lineWidth=2;lcCtx.stroke();}
}
function onHandResults(results){
  handVisible=!!(results.multiHandLandmarks?.length);
  const badge=document.getElementById('cam-badge');
  if(!handVisible){
    if(isPinching&&grabbedPiece)dropCurrent();
    isPinching=false;badge.textContent='no hand detected';badge.className='';
    lcCtx.clearRect(0,0,lcCanvas.width,lcCanvas.height);return;
  }
  const lm=results.multiHandLandmarks[0],thumb=lm[4],index=lm[8];
  const pdx=thumb.x-index.x,pdy=thumb.y-index.y,dist=Math.sqrt(pdx*pdx+pdy*pdy);
  wasPinching=isPinching;isPinching=dist<PINCH_THRESH;
  drawLandmarks(lm,isPinching);
  const mx=1-(thumb.x+index.x)/2,my=(thumb.y+index.y)/2;
  rawX=mx*canvas.width;rawY=my*canvas.height;
  curX+=(rawX-curX)*SMOOTH;curY+=(rawY-curY)*SMOOTH;
  if(isPinching&&!wasPinching)grabAt(curX,curY);
  else if(!isPinching&&wasPinching)dropCurrent();
  if(isPinching&&grabbedPiece){grabbedPiece.x=curX-grabOffset.x;grabbedPiece.y=curY-grabOffset.y;}
  badge.textContent=isPinching&&grabbedPiece?'✊ dragging':isPinching?'🤏 pinching':`✋ tracking · ${Math.round(dist*100)}%`;
  badge.className=isPinching&&grabbedPiece?'grabbing':isPinching?'pinching':'';
}

/* ═══════════════════════════════════════════════════════════
   STARTUP
═══════════════════════════════════════════════════════════ */
function setStatus(t,s){document.getElementById('status-text').textContent=t;document.getElementById('status-dot').className=s||'';}
function dismissOverlay(){document.getElementById('loading-overlay').classList.add('hidden');}
function switchToMouseMode(reason){
  if(inputMode==='mouse')return;
  inputMode='mouse';document.body.classList.add('mouse-mode');
  document.getElementById('webcam-wrap').style.display='none';
  document.getElementById('hint-card').innerHTML=
    '🖱️ <strong>Click & drag</strong> pieces into place<br>📱 Touch works on mobile<br>↺ Refresh to retry camera';
  setStatus(reason,'error');dismissOverlay();
}
function startMediaPipe(){
  const skipT=setTimeout(()=>{document.getElementById('skip-btn').style.display='block';},4000);
  const fallT=setTimeout(()=>{switchToMouseMode('Camera timed out — using mouse');},15000);
  const clean=()=>{clearTimeout(skipT);clearTimeout(fallT);};
  if(typeof Hands==='undefined'||typeof Camera==='undefined'){clean();switchToMouseMode('MediaPipe unavailable — using mouse');return;}
  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:.72,minTrackingConfidence:.55});
  let gotFrame=false;
  hands.onResults(r=>{
    if(!gotFrame){gotFrame=true;clean();setStatus('✋ Show your hand to play','ready');dismissOverlay();}
    onHandResults(r);
  });
  const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:640,height:480});
  document.getElementById('loading-text').textContent='Starting camera…';
  cam.start()
    .then(()=>{setTimeout(()=>{if(!gotFrame&&inputMode==='camera'){clean();switchToMouseMode('Camera blocked — using mouse');}},3000);})
    .catch(()=>{clean();switchToMouseMode('Camera error — using mouse');});
}

/* ═══════════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════════ */
function roundRect(ctx,x,y,w,h,r){
  if(ctx.roundRect){ctx.roundRect(x,y,w,h,r);return;}
  ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
loadImage('./puzzle.png');
updateBestDisplay();
window.addEventListener('load',()=>{setTimeout(startMediaPipe,200);});
render();
</script>
